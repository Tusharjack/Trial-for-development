<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riyas 50 day Challenge • Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1>Call Management</h1>
    <p class="muted">Sign in to continue</p>
    <form id="loginForm" class="form">
      <label>
        <span>Username</span>
        <input type="text" id="username" placeholder="e.g. admin" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" id="password" placeholder="••••••••" required />
      </label>
      <label class="inline">
        <input type="checkbox" id="remember" />
        <span>Remember me on this device</span>
      </label>
      <button type="submit" class="btn primary btn-full">Login</button>
    </form>
    <p id="loginError" class="error hidden">Invalid credentials</p>
    <footer class="auth-footer muted">
      Demo credentials: admin/admin123 or tcaller/tcaller123
    </footer>
  </main>
  <script src="script.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      App.init(); // seed and helpers
      Auth.attachLogin('loginForm', 'loginError', 'remember');
    });
  </script>
</body>
</html>
